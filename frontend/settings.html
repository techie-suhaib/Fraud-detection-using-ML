<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | FraudGuard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="settings.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-shield-virus"></i>
                <span>FraudGuard</span>
            </div>
                <div id="loginLinks" class="login-links">
                    <a href="admin.html"><i class="fas fa-user-shield"></i> Admin Login</a>
                    <a href="user.html"><i class="fas fa-user"></i> User Login</a>
                </div>

            <nav>
                <a href="index.html"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="transaction.html"><i class="fas fa-exchange-alt"></i> Transactions</a>
                <a href="security.html"><i class="fas fa-user-shield"></i> Security</a>
                <a href="settings.html" class="active"><i class="fas fa-cog"></i> Settings</a>
            </nav>
            <!-- Logged‑in user info and logout -->
            <div id="sidebarUserMenu" class="user-menu" style="display:none; margin-top:auto; padding:1rem 0;">
                <span id="sidebarUserInfo" class="sidebar-user-info">
                    <i class="fas fa-user-circle" style="color:var(--primary); font-size:1.1rem;"></i>
                    <span id="sidebarUserLabel">User</span>
                </span>
                <button id="logoutBtn" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </aside>

        <main class="main-content" style="padding: 0;">
            <div class="settings-wrapper">
                <aside class="settings-nav">
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 30px;">
                        <button class="toggle-btn sidebarToggle" style="margin-right: 5px; padding: 0;"><i class="fas fa-bars"></i></button>
                        <h2 style="margin: 0; padding-left: 0;">Settings</h2>
                    </div>
                    <ul>
                        <li class="active" onclick="showTab('profile')"><i class="fas fa-user"></i> Profile</li>
                        <li onclick="showTab('notifications')"><i class="fas fa-bell"></i> Notifications</li>
                        <li onclick="showTab('api')"><i class="fas fa-code"></i> API Keys</li>
                        <li onclick="showTab('appearance')"><i class="fas fa-palette"></i> Appearance</li>
                    </ul>
                </aside>

                <main class="settings-content">
                    <section id="profile" class="tab-content active">
                        <h3>Admin Profile</h3>
                        <div class="profile-header">
                            <img src="https://ui-avatars.com/api/?name=Admin+User&background=3b82f6&color=fff" alt="Avatar">
                            <button class="secondary-btn" style="width: auto;">Change Photo</button>
                        </div>
                        <form class="settings-form">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" value="Admin User">
                            </div>
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" value="admin@fraudguard.ai">
                            </div>
                            <button type="button" class="save-btn" onclick="notifySave()" style="width: auto;">Update Profile</button>
                        </form>
                    </section>

                    <section id="api" class="tab-content">
                        <h3>API Configuration</h3>
                        <p class="description">Connect your payment gateway to the fraud detection engine.</p>
                        <div class="form-group">
                            <label>Production API Key</label>
                            <div class="api-key-box">
                                <input type="password" value="fg_live_88291038475" id="apiKey" readonly>
                                <i class="fas fa-eye" onclick="toggleKey()"></i>
                            </div>
                        </div>
                        <button class="save-btn" style="width: auto;">Regenerate Key</button>
                    </section>
                </main>
            </div>
        </main>
    </div>
    <script src="settings.js"></script>
    <script src="navigation.js"></script>
</body>
</html>
